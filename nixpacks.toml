[phases.setup]
nixPkgs = [
  "python312",
  "chromium",
  "chromedriver",
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "xorg.libXi",
  "xorg.libXrender",
  "xorg.libXtst",
  "xorg.libXScrnSaver",
  "pango",
  "cairo",
  "alsa-lib",
  "gtk3",
  "stdenv.cc.cc.lib"
]

[variables]
GOOGLE_CHROME_BIN = "/nix/store/bin/chromium"
CHROME_BIN = "/nix/store/bin/chromium"
CHROMEDRIVER_PATH = "/nix/store/bin/chromedriver"

[start]
cmd = "python railway_scheduler_headless.py"
